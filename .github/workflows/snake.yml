name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Move snake to assets and push
        run: |
          mkdir -p assets
          mv dist/github-contribution-grid-snake.svg assets/
          mv dist/github-contribution-grid-snake-dark.svg assets/
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase false
          git add assets/github-contribution-grid-snake.svg
          git add assets/github-contribution-grid-snake-dark.svg
          git diff --staged --quiet || git commit -m "Update contribution snake to assets"
          # 尝试推送，失败则先pull再push
          git push || (git pull origin main --no-edit && git push)
