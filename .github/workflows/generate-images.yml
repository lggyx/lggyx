name: Generate GitHub Images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output
          fetch-depth: 0
        continue-on-error: true

      - name: Create images directory
        run: |
          mkdir -p images

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Download images
        run: |
          echo "Downloading GitHub Stats..."
          curl -fsSL -o images/github-stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&cache_seconds=86400" || echo "Stats failed"
          
          echo "Downloading Top Languages..."
          curl -fsSL -o images/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&theme=tokyonight&layout=compact&hide_border=true&langs_count=8&cache_seconds=86400" || echo "Langs failed"
          
          echo "Downloading GitHub Streak..."
          curl -fsSL -o images/github-streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true" || echo "Streak failed"
          
          echo "Downloading GitHub Trophy..."
          curl -fsSL -L -o images/github-trophy.png "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=algolia&row=1&column=7&margin-w=15&margin-h=15" || echo "Trophy failed"

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit and push to output branch
        run: |
          if [ ! -d "output/.git" ]; then
            # output branch doesn't exist, create it
            cd images
            git init
            git checkout -b output
            git remote add origin https://github.com/${{ github.repository }}.git
            git add .
            git commit -m "Update images $(date -Iseconds)"
            git push -f origin output
          else
            # output branch exists
            cd output
            cp -r ../images/* .
            git add .
            git commit -m "Update images $(date -Iseconds)" || echo "No changes"
            git push origin output
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
