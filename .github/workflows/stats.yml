name: Generate GitHub Stats Images

on:
  schedule:
    - cron: "0 */6 * * *"  # 每6小时更新一次
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p dist

      - name: Download GitHub Stats
        run: |
          # GitHub Stats
          curl -o dist/github-stats.svg "https://github-readme-stats.vercel.app/api?username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&cache_seconds=86400"
          # Top Languages
          curl -o dist/top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=${{ github.repository_owner }}&theme=tokyonight&layout=compact&hide_border=true&langs_count=8&cache_seconds=86400"
          # GitHub Streak
          curl -o dist/github-streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true"
          # GitHub Trophy (PNG format)
          curl -L -o dist/github-trophy.png "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=algolia&row=1&column=7&margin-w=15&margin-h=15"
        continue-on-error: true

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
