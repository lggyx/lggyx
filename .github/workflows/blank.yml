# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: lggyx
          template: classic
          # base: header, activity, community, repositories, metadata
          base: metadata
          config_timezone: Asia/Shanghai
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: Download additional images
        run: |
          echo "Downloading GitHub Stats..."
          curl -fsSL -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=lggyx&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&cache_seconds=86400" || echo "Stats download failed"
          
          echo "Downloading Top Languages..."
          curl -fsSL -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=lggyx&theme=tokyonight&layout=compact&hide_border=true&langs_count=8&cache_seconds=86400" || echo "Languages download failed"
          
          echo "Downloading GitHub Streak..."
          curl -fsSL -o github-streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=lggyx&theme=tokyonight&hide_border=true" || echo "Streak download failed"
          
          echo "Downloading GitHub Trophy..."
          curl -fsSL -L -o github-trophy.png "https://github-profile-trophy.vercel.app/?username=lggyx&theme=algolia&row=1&column=7&margin-w=15&margin-h=15" || echo "Trophy download failed"

      - name: Commit additional images
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add github-stats.svg top-langs.svg github-streak.svg github-trophy.png 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update GitHub profile images"
          git push
