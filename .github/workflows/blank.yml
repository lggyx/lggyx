# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Generate GitHub Assets
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  generate-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          # The following scopes are required:
          #  - public_access (default scope)
          # The following additional scopes may be required:
          #  - read:org      (for organization related metrics)
          #  - read:user     (for user related data)
          #  - read:packages (for some packages related data)
          #  - repo          (optional, if you want to include private repositories)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: lggyx
          template: classic
          # base: header, activity, community, repositories, metadata
          base: metadata
          config_timezone: Asia/Shanghai
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: Generate Contribution Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Move assets and commit
        run: |
          mkdir -p assets
          
          # 移动metrics（如果存在）
          if [ -f github-metrics.svg ]; then
            mv github-metrics.svg assets/
          fi
          
          # 移动snake文件（如果存在）
          if [ -f dist/github-contribution-grid-snake.svg ]; then
            mv dist/github-contribution-grid-snake.svg assets/
            mv dist/github-contribution-grid-snake-dark.svg assets/
          fi
          
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config pull.rebase false
          
          # 添加所有assets目录下的更改
          git add assets/
          git diff --staged --quiet || git commit -m "Update GitHub assets (metrics & snake)"
          
          # 尝试推送，失败则先pull再push
          git push || (git pull origin main --no-edit && git push)
